<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏰 시타델 CITADELS</title>
<style>
/* ── 리셋 & 변수 ── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#d4a843;--gold2:#f0c860;--gold3:#8a6520;
  --bg:#0a0c14;--bg2:#111520;--bg3:#181d2e;
  --border:rgba(212,168,67,.18);--border2:rgba(212,168,67,.4);
  --text:#e2d5b8;--dim:rgba(226,213,184,.38);--dim2:rgba(226,213,184,.6);
  --red:#e05252;--blue:#5b9bd5;--green:#4caf7d;--yellow:#d4a017;--purple:#9b59b6;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif,system-ui;user-select:none}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 50% at 15% 0%,rgba(212,168,67,.07) 0%,transparent 55%),
             radial-gradient(ellipse 50% 70% at 85% 100%,rgba(91,155,213,.05) 0%,transparent 55%)}
.z1{position:relative;z-index:1}
.hidden{display:none!important}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(212,168,67,.2);border-radius:2px}

/* ── LOBBY ── */
#screen-lobby{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;gap:14px}
.logo-wrap{text-align:center;margin-bottom:4px}
.logo-emoji{font-size:64px;display:block;filter:drop-shadow(0 0 20px rgba(212,168,67,.5));animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{filter:drop-shadow(0 0 20px rgba(212,168,67,.5))}50%{filter:drop-shadow(0 0 40px rgba(212,168,67,.8))}}
.logo-title{font-size:48px;font-weight:900;letter-spacing:8px;background:linear-gradient(180deg,#f0c860,#d4a843 50%,#8a6520);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;font-family:Georgia,serif}
.logo-sub{font-size:11px;letter-spacing:5px;color:var(--dim);margin-top:4px}

.tabs{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;width:100%;max-width:400px}
.tab{flex:1;padding:11px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;color:var(--dim2)}
.tab.on{background:rgba(212,168,67,.15);color:var(--gold2)}

.card{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:400px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.lbl{font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;display:block;margin-bottom:7px;font-family:Georgia,serif}
.inp{width:100%;padding:12px 15px;background:rgba(255,255,255,.04);border:1px solid rgba(212,168,67,.2);border-radius:8px;color:var(--text);font:15px system-ui,sans-serif;outline:none;transition:.2s;margin-bottom:15px}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,67,.1)}
.inp::placeholder{color:var(--dim)}
.inp-code{font-size:24px;text-align:center;letter-spacing:8px;font-family:Georgia,serif}
.cnt-row{display:flex;gap:6px;margin-bottom:16px}
.cnt-btn{flex:1;padding:10px 0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:7px;color:var(--dim);font-size:14px;font-weight:700;cursor:pointer;transition:.2s;font-family:Georgia,serif}
.cnt-btn.on{background:rgba(212,168,67,.15);border-color:var(--gold);color:var(--gold2)}
.btn-main{width:100%;padding:15px;background:linear-gradient(135deg,#d4a843,#8a6520);border:none;border-radius:9px;color:#07090f;font-size:15px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:.25s;position:relative;overflow:hidden;font-family:Georgia,serif}
.btn-main::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#f0c860,#d4a843);opacity:0;transition:.25s}
.btn-main:hover::after{opacity:1}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,168,67,.3)}
.btn-main span{position:relative;z-index:1}

/* ── WAITING ── */
#screen-waiting{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;gap:14px}
.wait-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:420px;position:relative;overflow:hidden}
.wait-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.code-box{background:rgba(212,168,67,.08);border:1px solid rgba(212,168,67,.25);border-radius:10px;padding:14px;text-align:center;margin-bottom:16px}
.code-lbl{font-size:9px;letter-spacing:3px;color:var(--gold);font-family:Georgia,serif;margin-bottom:5px}
.code-val{font-size:34px;font-family:Georgia,serif;font-weight:900;color:var(--gold2);letter-spacing:10px}
.code-copy{font-size:11px;color:var(--dim);margin-top:4px;cursor:pointer}
.code-copy:hover{color:var(--gold)}
.w-list{margin-bottom:14px}
.w-player{display:flex;align-items:center;gap:10px;padding:9px 12px;background:rgba(255,255,255,.04);border-radius:8px;margin-bottom:6px;font-size:13px}
.w-player.host{border:1px solid rgba(212,168,67,.2)}
.w-dot{width:8px;height:8px;border-radius:50%;background:#4caf7d;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.conn-status{font-size:11px;text-align:center;padding:6px;border-radius:6px;margin-bottom:12px}
.conn-ok{background:rgba(76,175,125,.15);color:#7ecca1;border:1px solid rgba(76,175,125,.2)}
.conn-err{background:rgba(224,82,82,.15);color:#f08080;border:1px solid rgba(224,82,82,.2)}
.conn-ing{background:rgba(212,168,67,.1);color:var(--gold);border:1px solid rgba(212,168,67,.2)}

/* ── GAME ── */
#screen-game{display:grid;grid-template-columns:240px 1fr 260px;grid-template-rows:50px 40px 1fr 58px;height:100vh;overflow:hidden}

.topbar{grid-column:1/-1;background:rgba(10,12,20,.97);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;z-index:20}
.tb-logo{font-size:17px;font-weight:900;color:var(--gold);letter-spacing:3px;font-family:Georgia,serif}
.tb-div{width:1px;height:22px;background:var(--border)}
.tb-phase{font-size:11px;font-weight:700;padding:3px 12px;border-radius:18px;border:1px solid}
.ph-sel{color:#9b59b6;border-color:rgba(155,89,182,.4);background:rgba(155,89,182,.1)}
.ph-act{color:var(--gold2);border-color:rgba(212,168,67,.4);background:rgba(212,168,67,.1)}
.tb-sp{flex:1}
.tb-stat{display:flex;align-items:center;gap:8px;background:rgba(212,168,67,.07);border:1px solid var(--border);border-radius:7px;padding:4px 12px;font-size:12px}
.tb-stat span{display:flex;align-items:center;gap:3px}

/* ── TURN ORDER ── */
.turn-bar{grid-column:1/-1;background:rgba(10,12,20,.85);border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:5px;padding:0 14px;overflow-x:auto;flex-wrap:nowrap}
.to-lbl{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;flex-shrink:0;margin-right:4px;font-family:Georgia,serif}
.to-item{display:flex;align-items:center;gap:3px;padding:3px 7px;border-radius:7px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);flex-shrink:0;font-size:11px;color:var(--dim);transition:.2s}
.to-item.cur{background:rgba(212,168,67,.12);border-color:rgba(212,168,67,.4);color:var(--gold2);box-shadow:0 0 8px rgba(212,168,67,.15)}
.to-item.done{opacity:.38}
.to-item.dead{background:rgba(224,82,82,.1);border-color:rgba(224,82,82,.3);color:#f08080;opacity:.6}
.to-arrow{color:var(--dim);font-size:10px;flex-shrink:0}
.to-av{width:18px;height:18px;border-radius:50%;border:1px solid;font-size:11px;display:flex;align-items:center;justify-content:center}

/* ── LEFT PANEL ── */
.p-left{background:rgba(10,12,20,.92);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.p-sect{padding:8px 11px 5px;font-size:9px;letter-spacing:3px;color:var(--dim);border-bottom:1px solid rgba(255,255,255,.04);font-family:Georgia,serif}
.p-list{overflow-y:auto;flex:1;padding:6px}

.pcard{border-radius:9px;padding:9px 10px;margin-bottom:6px;border:1px solid rgba(255,255,255,.06);background:rgba(20,24,38,.6);transition:.2s;cursor:default}
.pcard.me{border-color:rgba(155,89,182,.35)}
.pcard.active{border-color:rgba(212,168,67,.5);background:rgba(212,168,67,.06);animation:glow 2s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 0 rgba(212,168,67,0)}50%{box-shadow:0 0 12px rgba(212,168,67,.15)}}
.pcard.dead{opacity:.45}
.pcard.tsel{cursor:pointer!important;border-color:rgba(224,82,82,.4)!important}
.pcard.tsel:hover{background:rgba(224,82,82,.1)!important}
.pc-top{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.pc-av{width:30px;height:30px;border-radius:50%;font-size:15px;display:flex;align-items:center;justify-content:center;border:2px solid transparent;flex-shrink:0}
.pc-name{font-size:12px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-char{font-size:17px;flex-shrink:0}
.pc-tags{display:flex;flex-wrap:wrap;gap:2px;margin-top:1px}
.tag{font-size:9px;padding:1px 5px;border-radius:8px;border:1px solid;font-family:Georgia,serif}
.t-ai{background:rgba(255,255,255,.06);color:var(--dim2);border-color:rgba(255,255,255,.1)}
.t-turn{background:rgba(212,168,67,.2);color:var(--gold2);border-color:rgba(212,168,67,.3)}
.t-crown{background:rgba(212,160,23,.15);color:#f5d06a;border-color:rgba(212,160,23,.2)}
.t-done{background:rgba(76,175,125,.15);color:#7ecca1;border-color:rgba(76,175,125,.2)}
.t-dead{background:rgba(224,82,82,.15);color:#f08080;border-color:rgba(224,82,82,.2)}
.t-human{background:rgba(91,155,213,.15);color:#89c4f4;border-color:rgba(91,155,213,.2)}
.pc-stats{display:flex;gap:6px;flex-wrap:wrap}
.pc-stat{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:2px}
.pc-stat strong{color:var(--text)}
.pc-city{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.cpip{width:8px;height:8px;border-radius:50%;border:1px solid rgba(255,255,255,.15)}

/* ── FEED ── */
.feed-wrap{border-top:1px solid var(--border);height:200px;display:flex;flex-direction:column}
.feed-hdr{padding:7px 11px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.04);flex-shrink:0}
.feed-title{font-size:9px;letter-spacing:3px;color:var(--gold);font-family:Georgia,serif}
.feed-list{overflow-y:auto;flex:1;padding:5px 9px}
.fe{display:flex;align-items:flex-start;gap:6px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03);animation:fi .2s ease-out}
@keyframes fi{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
.fe-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.fe-text{font-size:10px;line-height:1.5;color:var(--dim2)}
.fe-text b{color:var(--text)}
.ev-system .fe-text,.ev-win .fe-text{color:var(--text)}
.ev-gold .fe-icon{color:#f0c860}
.ev-card .fe-icon{color:#5b9bd5}
.ev-build .fe-icon{color:#4caf7d}
.ev-combat .fe-icon{color:#e05252}
.ev-win .fe-icon{color:#f0c860}
.ev-system .fe-icon{color:var(--gold)}

/* ── MAIN ── */
.main{overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.sect{font-size:10px;letter-spacing:3px;color:var(--gold);display:flex;align-items:center;gap:8px;margin-bottom:8px;font-family:Georgia,serif}
.sect::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.banner{border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;border:1px solid}
.bn-sel{background:rgba(155,89,182,.08);border-color:rgba(155,89,182,.2)}
.bn-act{background:rgba(212,168,67,.07);border-color:rgba(212,168,67,.2)}
.bn-wait{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.07)}
.bn-icon{font-size:28px;flex-shrink:0}
.bn-title{font-size:14px;font-weight:700;margin-bottom:2px}
.bn-desc{font-size:11px;color:var(--dim2);line-height:1.5}
.my-strip{display:flex;align-items:center;gap:11px;padding:11px 14px;border-radius:9px;border:1px solid}
.hint{background:rgba(224,82,82,.08);border:1px solid rgba(224,82,82,.25);border-radius:9px;padding:9px 13px;font-size:11px;color:#f08080}

/* income */
.income-row{display:flex;gap:8px}
.inc-btn{flex:1;padding:13px 10px;border-radius:9px;border:1px solid;cursor:pointer;transition:.2s;text-align:center;font-weight:700}
.inc-btn:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.3)}
.inc-gold{background:rgba(212,168,67,.1);border-color:rgba(212,168,67,.35);color:var(--gold2)}
.inc-card{background:rgba(91,155,213,.1);border-color:rgba(91,155,213,.35);color:#89c4f4}
.inc-icon{font-size:26px;margin-bottom:3px}
.inc-lbl{font-size:11px}
.inc-sub{font-size:9px;color:var(--dim);margin-top:1px}
.empty{color:var(--dim);font-size:12px;padding:6px 0}

/* cards */
.hand-grid{display:flex;flex-wrap:wrap;gap:7px}
.dcard{width:86px;border-radius:9px;background:var(--bg3);border:1px solid rgba(255,255,255,.07);padding:9px 7px 7px;cursor:pointer;transition:.2s;position:relative;text-align:center;overflow:hidden}
.dcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.dcard.c-yellow::before{background:linear-gradient(90deg,#b8860b,#f5d06a)}
.dcard.c-blue::before{background:linear-gradient(90deg,#2c5f8a,#5b9bd5)}
.dcard.c-green::before{background:linear-gradient(90deg,#1a5c35,#4caf7d)}
.dcard.c-red::before{background:linear-gradient(90deg,#8a2020,#e05252)}
.dcard.c-purple::before{background:linear-gradient(90deg,#5c2d8a,#9b59b6)}
.dcard:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.15);box-shadow:0 7px 20px rgba(0,0,0,.4)}
.dcard.sel{transform:translateY(-6px)}
.dcard.sel.c-yellow{border-color:#d4a017;box-shadow:0 0 14px rgba(212,160,23,.3)}
.dcard.sel.c-blue{border-color:#5b9bd5;box-shadow:0 0 14px rgba(91,155,213,.3)}
.dcard.sel.c-green{border-color:#4caf7d;box-shadow:0 0 14px rgba(76,175,125,.3)}
.dcard.sel.c-red{border-color:#e05252;box-shadow:0 0 14px rgba(224,82,82,.3)}
.dcard.sel.c-purple{border-color:#9b59b6;box-shadow:0 0 14px rgba(155,89,182,.3)}
.dcard.disabled{opacity:.32;cursor:not-allowed;pointer-events:none}
.dcard.city-card:hover{transform:translateY(-2px)}
.dcard.draw-pick{border-color:rgba(212,168,67,.35);cursor:pointer}
.dcard.draw-pick:hover{border-color:var(--gold2);box-shadow:0 0 14px rgba(212,168,67,.25)}
.dcard.dscard{border-color:#e05252!important;background:rgba(224,82,82,.1)}
.dc-icon{font-size:24px;margin-bottom:3px}
.dc-name{font-size:9px;font-weight:700}
.dc-cost{position:absolute;top:5px;right:5px;width:16px;height:16px;border-radius:50%;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif}
.dc-sp{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);font-size:10px;opacity:.5}
.c-yellow .dc-name{color:#d4a017}.c-yellow .dc-cost{background:#d4a017;color:#07090f}
.c-blue .dc-name{color:#5b9bd5}.c-blue .dc-cost{background:#5b9bd5;color:#07090f}
.c-green .dc-name{color:#4caf7d}.c-green .dc-cost{background:#4caf7d;color:#07090f}
.c-red .dc-name{color:#e05252}.c-red .dc-cost{background:#e05252;color:#07090f}
.c-purple .dc-name{color:#9b59b6}.c-purple .dc-cost{background:#9b59b6;color:#fff}

/* char select */
.csel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px}
.csel-card{border-radius:10px;border:1px solid;padding:14px 10px;cursor:pointer;transition:.25s;text-align:center;position:relative;overflow:hidden}
.csel-icon{font-size:36px;margin-bottom:7px;display:block}
.csel-num{font-size:9px;color:var(--dim);margin-bottom:2px;font-family:Georgia,serif}
.csel-name{font-size:13px;font-weight:800;margin-bottom:5px}
.csel-ab{font-size:10px;color:var(--dim2);line-height:1.5}

/* wizard */
.wiz-panel{background:rgba(155,89,182,.08);border:1px solid rgba(155,89,182,.25);border-radius:9px;padding:12px;display:flex;flex-direction:column;gap:7px}
.wiz-title{font-size:10px;color:#c39bd3;letter-spacing:2px;margin-bottom:3px;font-family:Georgia,serif}
.wiz-btn{padding:10px 14px;border-radius:7px;border:1px solid rgba(155,89,182,.3);background:rgba(155,89,182,.1);color:#c39bd3;font-size:11px;cursor:pointer;text-align:left;transition:.2s;line-height:1.5}
.wiz-btn:hover{background:rgba(155,89,182,.2);transform:translateX(3px)}

/* warlord */
.wo-wrap{background:rgba(224,82,82,.06);border:1px solid rgba(224,82,82,.25);border-radius:10px;padding:14px}
.wo-title{font-size:12px;font-weight:700;color:#f08080;margin-bottom:8px}
.wo-grid{display:flex;flex-wrap:wrap;gap:7px}
.wo-cost{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);font-size:9px;background:rgba(224,82,82,.85);color:#fff;padding:1px 5px;border-radius:6px;white-space:nowrap}

/* ── RIGHT PANEL ── */
.p-right{background:rgba(10,12,20,.92);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.cl{overflow-y:auto;flex:1;padding:7px}
.ci{padding:7px 9px;border-radius:7px;margin-bottom:4px;border:1px solid rgba(255,255,255,.05);transition:.2s}
.ci.mine{border-color:rgba(212,168,67,.4)!important}
.ci.removed{opacity:.2}
.ci.tmode{cursor:pointer;border-color:rgba(224,82,82,.3)!important}
.ci.tmode:hover{background:rgba(224,82,82,.1);transform:translateX(2px)}
.ci-head{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.ci-num{font-size:9px;color:var(--dim);width:13px;font-family:Georgia,serif}
.ci-icon{font-size:14px}
.ci-name{font-size:11px;font-weight:700}
.ci-ab{font-size:9px;color:var(--dim);line-height:1.5}
.ci-badges{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.cbadge{font-size:8px;padding:1px 5px;border-radius:6px;border:1px solid;font-family:Georgia,serif}
.cb-mine{background:rgba(212,168,67,.2);color:var(--gold2);border-color:rgba(212,168,67,.3)}
.cb-dead{background:rgba(224,82,82,.2);color:#f08080;border-color:rgba(224,82,82,.3)}
.cb-thf{background:rgba(245,166,35,.2);color:#f5a623;border-color:rgba(245,166,35,.3)}
.cb-rm{background:rgba(255,255,255,.06);color:var(--dim2);border-color:rgba(255,255,255,.1)}

.city-p{padding:9px;border-top:1px solid var(--border);max-height:190px;overflow-y:auto}
.cpr{margin-bottom:8px}
.cpr-name{font-size:10px;color:var(--dim2);margin-bottom:4px;font-weight:700}
.cpips{display:flex;flex-wrap:wrap;gap:3px}
.cpi{display:flex;align-items:center;gap:3px;font-size:9px;padding:2px 5px;border-radius:5px;border:1px solid;cursor:pointer}
.cpi:hover{opacity:.8}

/* ── ACTION BAR ── */
.abar{grid-column:1/-1;background:rgba(10,12,20,.98);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:7px;overflow-x:auto}
.ab-lbl{font-size:10px;letter-spacing:2px;color:var(--gold);flex-shrink:0;font-family:Georgia,serif}
.ab-div{width:1px;height:26px;background:var(--border);flex-shrink:0}
.ab-wait{font-size:12px;color:var(--dim);display:flex;align-items:center;gap:7px}
.ab-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:blink 1.5s infinite}
#abar-btns{display:flex;gap:7px;align-items:center;padding:8px 0;flex-wrap:wrap}
.ab{padding:8px 14px;border-radius:7px;border:1px solid;font-size:11px;font-weight:700;cursor:pointer;transition:.2s;white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0;font-family:system-ui,sans-serif}
.ab:disabled{opacity:.3;cursor:not-allowed}
.ab:not(:disabled):hover{transform:translateY(-1px)}
.ab-gold{background:rgba(212,168,67,.1);border-color:rgba(212,168,67,.4);color:var(--gold2)}
.ab-gold:not(:disabled):hover{background:rgba(212,168,67,.2)}
.ab-blue{background:rgba(91,155,213,.1);border-color:rgba(91,155,213,.35);color:#89c4f4}
.ab-green{background:rgba(76,175,125,.1);border-color:rgba(76,175,125,.35);color:#7ecca1}
.ab-green:not(:disabled):hover{background:rgba(76,175,125,.2)}
.ab-purple{background:rgba(155,89,182,.1);border-color:rgba(155,89,182,.4);color:#c39bd3}
.ab-purple:not(:disabled):hover{background:rgba(155,89,182,.2)}
.ab-dim{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);color:var(--dim2)}
.ab-dim:not(:disabled):hover{background:rgba(255,255,255,.08);color:var(--text)}
.ab-end{background:rgba(76,175,125,.12);border-color:rgba(76,175,125,.3);color:#7ecca1}

/* ── MODALS ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(4px)}
.modal{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:16px;padding:32px;max-width:460px;width:90%;position:relative;overflow:hidden;animation:min .3s ease-out}
@keyframes min{from{opacity:0;transform:scale(.9) translateY(14px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.tt-box{max-width:300px;text-align:center}
.tt-icon{font-size:52px;margin-bottom:9px;display:block}
.tt-name{font-size:20px;font-weight:800;margin-bottom:3px}
.tt-type{font-size:10px;letter-spacing:3px;color:var(--dim);font-family:Georgia,serif;margin-bottom:12px}
.tt-cost{display:inline-flex;align-items:center;gap:5px;margin-bottom:12px}
.tt-cb{width:32px;height:32px;border-radius:50%;font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif}
.tt-sp{background:rgba(155,89,182,.1);border:1px solid rgba(155,89,182,.25);border-radius:9px;padding:11px;font-size:11px;color:#c39bd3;line-height:1.7;text-align:left;margin-bottom:14px}
.tt-sp-lbl{font-size:8px;letter-spacing:2px;color:#9b59b6;display:block;margin-bottom:4px;font-family:Georgia,serif}
.close-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--dim2);padding:7px 22px;border-radius:7px;cursor:pointer;font-size:12px}

/* game over */
.go-trophy{font-size:68px;margin-bottom:10px;animation:ts .6s .2s ease-out both}
@keyframes ts{from{transform:rotate(-20deg) scale(.5);opacity:0}to{transform:rotate(0) scale(1);opacity:1}}
.go-title{font-size:30px;font-weight:900;color:var(--gold);margin-bottom:5px;font-family:Georgia,serif}
.go-winner{font-size:17px;margin-bottom:20px}
.go-scores{list-style:none;margin-bottom:24px;width:100%}
.go-sc{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-radius:7px;margin-bottom:4px;font-size:12px}
.go-sc:nth-child(1){background:rgba(212,168,67,.12);border:1px solid rgba(212,168,67,.2)}
.go-sc:nth-child(n+2){background:rgba(255,255,255,.04)}
.go-pts{color:var(--gold2);font-weight:800;font-family:Georgia,serif}

/* notif */
#notif{position:fixed;top:98px;left:50%;transform:translateX(-50%) translateY(-12px);padding:9px 22px;border-radius:22px;font-size:12px;font-weight:700;z-index:1000;opacity:0;transition:.25s;pointer-events:none;white-space:nowrap;box-shadow:0 5px 20px rgba(0,0,0,.4)}
#notif.show{opacity:1;transform:translateX(-50%) translateY(0)}
.n-ok{background:rgba(76,175,125,.9);color:#07090f}
.n-warn{background:rgba(212,168,67,.95);color:#07090f}
.n-bad{background:rgba(224,82,82,.9);color:#fff}
.n-info{background:rgba(91,155,213,.9);color:#07090f}

/* chat */
.chat-bar{position:fixed;bottom:62px;right:14px;z-index:30;display:flex;gap:6px}
.chat-inp{width:180px;padding:7px 11px;background:rgba(20,24,38,.95);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none}
.chat-send{padding:7px 12px;background:rgba(212,168,67,.2);border:1px solid rgba(212,168,67,.4);border-radius:8px;color:var(--gold2);font-size:12px;cursor:pointer}
</style>
</head>
<body class="z1">

<div id="notif"></div>

<!-- ══ LOBBY ══ -->
<div id="screen-lobby" class="z1">
  <div class="logo-wrap">
    <span class="logo-emoji">🏰</span>
    <div class="logo-title">CITADELS</div>
    <div class="logo-sub">시타델 · 도시를 건설하라</div>
  </div>
  <div class="tabs" id="tabs">
    <div class="tab on" data-t="solo">🤖 혼자하기</div>
    <div class="tab" data-t="host">📡 방 만들기</div>
    <div class="tab" data-t="join">🔑 방 참가</div>
  </div>
  <div class="card" id="t-solo">
    <label class="lbl">내 이름</label>
    <input class="inp" id="soloName" placeholder="영주의 이름..." maxlength="10">
    <label class="lbl">AI 플레이어 수</label>
    <div class="cnt-row" id="aiRow">
      <button class="cnt-btn" data-n="1">1명</button>
      <button class="cnt-btn on" data-n="3">3명</button>
      <button class="cnt-btn" data-n="4">4명</button>
      <button class="cnt-btn" data-n="5">5명</button>
    </div>
    <button class="btn-main" onclick="startSolo()"><span>⚔️ 게임 시작</span></button>
  </div>
  <div class="card hidden" id="t-host">
    <label class="lbl">내 이름</label>
    <input class="inp" id="hostName" placeholder="방장 이름..." maxlength="10">
    <button class="btn-main" onclick="doCreateRoom()"><span>📡 방 만들기</span></button>
  </div>
  <div class="card hidden" id="t-join">
    <label class="lbl">내 이름</label>
    <input class="inp" id="joinName" placeholder="플레이어 이름..." maxlength="10">
    <label class="lbl">방 코드 (6자리)</label>
    <input class="inp inp-code" id="joinCode" placeholder="XXXXXX" maxlength="6" oninput="this.value=this.value.toUpperCase()">
    <button class="btn-main" onclick="doJoinRoom()"><span>🔑 참가하기</span></button>
  </div>
</div>

<!-- ══ WAITING ══ -->
<div id="screen-waiting" class="z1 hidden">
  <div class="logo-wrap" style="margin-bottom:0">
    <span class="logo-emoji" style="font-size:48px">🏰</span>
    <div class="logo-title" style="font-size:28px;letter-spacing:5px">대기실</div>
  </div>
  <div class="wait-card">
    <div id="connStatus" class="conn-status conn-ing">🔄 서버 연결 중...</div>
    <div class="code-box">
      <div class="code-lbl">방 코드 — 친구에게 공유하세요</div>
      <div class="code-val" id="wCode">------</div>
      <div class="code-copy" onclick="copyCode()">📋 클립보드에 복사</div>
    </div>
    <div class="w-list" id="wList"></div>
    <div id="aiWaitWrap" class="hidden" style="margin-bottom:12px">
      <label class="lbl" style="margin-bottom:5px">AI 추가 (빈 자리 채우기)</label>
      <div class="cnt-row" id="wAiRow">
        <button class="cnt-btn on" data-n="0">없음</button>
        <button class="cnt-btn" data-n="1">1명</button>
        <button class="cnt-btn" data-n="2">2명</button>
        <button class="cnt-btn" data-n="3">3명</button>
      </div>
    </div>
    <div id="hostStartWrap" class="hidden">
      <button class="btn-main" onclick="hostStart()"><span>⚔️ 게임 시작 (호스트)</span></button>
    </div>
    <div id="waitMsg" style="text-align:center;font-size:12px;color:var(--dim);margin-top:10px">호스트가 게임을 시작할 때까지 기다려주세요...</div>
  </div>
</div>

<!-- ══ GAME ══ -->
<div id="screen-game" class="z1 hidden">
  <div class="topbar">
    <div class="tb-logo">🏰 CITADELS</div>
    <div class="tb-div"></div>
    <div id="tbPhase" class="tb-phase ph-sel">🎭 캐릭터 선택</div>
    <div class="tb-div"></div>
    <div class="tb-info" style="display:flex;gap:14px;font-size:11px;color:var(--dim2)">
      <span>라운드 <b id="tbRound">1</b></span>
      <span>덱 <b id="tbDeck">0</b>장</span>
    </div>
    <div class="tb-sp"></div>
    <div class="tb-stat">
      <span>💰 <b id="tbGold">0</b></span>
      <span>🃏 <b id="tbHand">0</b></span>
      <span>🏛️ <b id="tbCity">0</b>/7</span>
      <span>⭐ <b id="tbScore">0</b></span>
    </div>
  </div>
  <div class="turn-bar" id="turnBar"></div>
  <div class="p-left">
    <div class="p-sect">참가자</div>
    <div class="p-list" id="pList"></div>
    <div class="feed-wrap">
      <div class="feed-hdr"><span class="feed-title">📋 진행 기록</span><span style="font-size:9px;color:var(--dim)" id="feedCnt">0건</span></div>
      <div class="feed-list" id="feedList"></div>
    </div>
  </div>
  <div class="main" id="mainArea"></div>
  <div class="p-right">
    <div class="p-sect">캐릭터 (1→8 순서로 행동)</div>
    <div class="cl" id="charList"></div>
    <div class="city-p" id="cityPanel"><div style="font-size:9px;letter-spacing:2px;color:var(--dim);font-family:Georgia,serif;margin-bottom:7px">다른 플레이어 도시</div></div>
  </div>
  <div class="abar">
    <div class="ab-lbl">ACTION</div>
    <div class="ab-div"></div>
    <div id="abar-btns"></div>
  </div>
</div>

<!-- 채팅 -->
<div class="chat-bar hidden" id="chatBar">
  <input class="chat-inp" id="chatInp" placeholder="채팅..." maxlength="40" onkeydown="if(event.key==='Enter')sendChat()">
  <button class="chat-send" onclick="sendChat()">전송</button>
</div>

<!-- Card Tooltip -->
<div id="ttModal" class="modal-bg hidden" onclick="closeTT()">
  <div class="modal tt-box" onclick="event.stopPropagation()">
    <span class="tt-icon" id="ttIcon"></span>
    <div class="tt-name" id="ttName"></div>
    <div class="tt-type" id="ttType"></div>
    <div class="tt-cost"><div class="tt-cb" id="ttCB"></div><span style="font-size:11px;color:var(--dim)">건설 비용</span></div>
    <div class="tt-sp hidden" id="ttSpBox"><span class="tt-sp-lbl">✨ 특수 능력</span><span id="ttSpText"></span></div>
    <button class="close-btn" onclick="closeTT()">닫기</button>
  </div>
</div>

<!-- Game Over -->
<div id="goModal" class="modal-bg hidden">
  <div class="modal" style="text-align:center">
    <div class="go-trophy">🏆</div>
    <div class="go-title">GAME OVER</div>
    <div class="go-winner" id="goWinner"></div>
    <ul class="go-scores" id="goScores"></ul>
    <button class="btn-main" onclick="goLobby()" style="max-width:180px;margin:0 auto"><span>🏠 로비로</span></button>
  </div>
</div>

<script src="data.js"></script>
<script src="client.js"></script>
</body>
</html>
